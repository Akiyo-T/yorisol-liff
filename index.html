<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>診断フォームへ移動中...</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 40px; color: #555;">
  <p id="msg">読み込み中...</p>

  <script>
    var LIFF_ID = '2010456176-ykpOcZre';
    var FORM_BASE_URL = 'https://docs.google.com/forms/d/1iVS20iLrgHYCPEpDJlneHUPdUnDBjcm3XS9F8UdoVPQ/viewform';
    var UID_ENTRY_ID = '1564487558';

    document.getElementById('msg').textContent = 'Step1: HTML読み込み完了';

    var s = document.createElement('script');
    s.src = 'https://static.line-scdn.net/liff/edge/2/sdk.js';
    s.onload = function() {
      document.getElementById('msg').textContent = 'Step2: SDK読み込み完了。初期化中...';
      liff.init({ liffId: LIFF_ID })
        .then(function() {
          document.getElementById('msg').textContent = 'Step3: 初期化OK';
          if (!liff.isLoggedIn()) {
            liff.login();
            return;
          }
          return liff.getProfile();
        })
        .then(function(profile) {
          if (profile && profile.userId) {
            var url = FORM_BASE_URL + '?usp=pp_url&entry.' + UID_ENTRY_ID + '=' + encodeURIComponent(profile.userId);
            window.location.href = url;
          } else {
            window.location.href = FORM_BASE_URL;
          }
        })
        .catch(function(err) {
          document.getElementById('msg').textContent = 'エラー: ' + JSON.stringify(err);
        });
    };
    s.onerror = function() {
      document.getElementById('msg').textContent = 'エラー: SDK読み込み失敗';
    };
    document.head.appendChild(s);
  </script>
</body>
</html>
